# Development overrides — applied automatically by `docker compose up`
services:
  backend:
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/src:/app/src
      - uploads_data:/data/uploads
      - faiss_data:/data/faiss

  frontend:
    build:
      context: ./frontend
      target: dev
    command: npm run dev -- --host 0.0.0.0 --port 3080
    ports:
      - "3080:3080"
    volumes:
      - ./frontend/src:/app/src

  worker:
    command: celery -A src.tasks.celery_app worker --loglevel=debug --concurrency=1
    volumes:
      - ./backend/src:/app/src
      - uploads_data:/data/uploads
      - faiss_data:/data/faiss
