services:
  frontend:
    build: ./frontend
    ports:
      - "3080:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/data/uploads
      - faiss_data:/data/faiss

  worker:
    build: ./backend
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - uploads_data:/data/uploads
      - faiss_data:/data/faiss

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: legalanalyzer
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  faiss_data:
